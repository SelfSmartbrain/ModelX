name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels: ['feature', 'enhancement']
  - title: '🐛 Bug Fixes'
    labels: ['bug', 'fix']
  - title: '📚 Documentation'
    labels: ['documentation', 'docs']
  - title: '🔧 Maintenance'
    labels: ['maintenance', 'chore', 'refactor']
  - title: '⚡ Performance'
    labels: ['performance', 'perf']
  - title: '🔒 Security'
    labels: ['security']
change-template: '- $TITLE (@$AUTHOR) (#$NUMBER)'
version-resolver:
  major:
    labels: ['major', 'breaking']
  minor:
    labels: ['feature', 'enhancement']
  patch:
    labels: ['bug', 'fix', 'patch', 'maintenance', 'chore', 'refactor', 'documentation', 'docs', 'performance', 'perf', 'security']
  default: patch
template: |
  ## Changes

  $CHANGES