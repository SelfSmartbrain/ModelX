# Alembic configuration file.

[alembic]
# Path to migration scripts directory
script_location = alembic

# Template used to generate migration file names.
# Uses ISO-8601 timestamps for deterministic ordering.
file_template = %%(rev)s_%%(slug)s

# sys.path prepend — project root so `src.*` imports work.
prepend_sys_path = .

# Timezone for migration file timestamps (UTC).
timezone = UTC

# Max length of revision identifiers (truncated slug).
truncate_slug_length = 40

# Use "revision" as the Alembic version table name.
version_table = alembic_version

# The target database URL.
# This is overridden at runtime by env.py from the application settings.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Run ruff format on newly generated migration files.
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
